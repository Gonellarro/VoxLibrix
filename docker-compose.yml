services:
  # --- Motor CPU / Genérico ---
  tts-engine-cpu:
    profiles: [ "cpu" ]
    build:
      context: ./tts-engine
      dockerfile: Dockerfile.cpu
    container_name: tts-engine-cpu
    user: "1000:1000"
    expose:
      - "8000"
    volumes:
      - ./data/models:/models
      - ./data/voices:/voice
    networks:
      default:
        aliases:
          - tts-engine
    environment:
      - HF_HOME=/models
      - DEVICE=cpu
      - DTYPE=float32
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8g

  # --- Motor NVIDIA RTX ---
  tts-engine-nvidia:
    profiles: [ "nvidia" ]
    build:
      context: ./tts-engine
      dockerfile: Dockerfile.nvidia
    container_name: tts-engine-nvidia
    user: "1000:1000"
    expose:
      - "8000"
    volumes:
      - ./data/models:/models
      - ./data/voices:/voice
    networks:
      default:
        aliases:
          - tts-engine
    environment:
      - HF_HOME=/models
    # Esto es crucial para que Docker pase la tarjeta NVIDIA al contenedor
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: unless-stopped

  # --- Motor AMD ROCm (iGPU Radeon 780M / gfx1103) ---
  tts-engine-rocm:
    profiles: [ "rocm" ]
    privileged: true
    user: "0:0"
    build:
      context: ./tts-engine
      dockerfile: Dockerfile.rocm
    container_name: tts-engine-rocm
    # ROCm necesita acceso directo a los dispositivos de renderizado y KFD
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    expose:
      - "8000"
    volumes:
      - ./data/models:/models
      - ./data/voices:/voice
    networks:
      default:
        aliases:
          - tts-engine
    environment:
      - HF_HOME=/models
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
    deploy:
      resources:
        limits:
          memory: 12g  # Recomendado para modelos 1.7B o clonación
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: audiobook-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: audiobook-backend
    user: "1000:1000"
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - ./data:/data
    environment:
      - CLOUD_TTS_URL=${CLOUD_TTS_URL}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      - TTS_ENGINE_URL=${TTS_ENGINE_URL}
      - DATA_DIR=${DATA_DIR}
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload

  frontend:
    build: ./frontend
    container_name: audiobook-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    restart: unless-stopped
