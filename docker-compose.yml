services:
  # --- Motor CPU / Genérico ---
  tts-engine-cpu:
    profiles: [ "cpu" ]
    build:
      context: ./tts-engine
      dockerfile: Dockerfile.cpu
    container_name: tts-engine-cpu
    user: "1000:1000"
    expose:
      - "8000"
    volumes:
      - ./data/models:/models
      - ./data/voices:/voice
    networks:
      default:
        aliases:
          - tts-engine
    environment:
      - HF_HOME=/models
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4g

  # --- Motor NVIDIA RTX ---
  tts-engine-nvidia:
    profiles: [ "nvidia" ]
    build:
      context: ./tts-engine
      dockerfile: Dockerfile.nvidia
    container_name: tts-engine-nvidia
    user: "1000:1000"
    expose:
      - "8000"
    volumes:
      - ./data/models:/models
      - ./data/voices:/voice
    networks:
      default:
        aliases:
          - tts-engine
    environment:
      - HF_HOME=/models
    # Esto es crucial para que Docker pase la tarjeta NVIDIA al contenedor
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: audiobook-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=audiobooks
      - POSTGRES_USER=audio_user
      - POSTGRES_PASSWORD=audio_pass
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U audio_user -d audiobooks" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: audiobook-backend
    user: "1000:1000"
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - ./data:/data
    environment:
      - DATABASE_URL=postgresql+asyncpg://audio_user:audio_pass@postgres/audiobooks
      - TTS_ENGINE_URL=http://tts-engine:8000
      - DATA_DIR=/data
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload

  frontend:
    build: ./frontend
    container_name: audiobook-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    restart: unless-stopped
