services:
  tts-engine:
    build: ./tts-engine
    container_name: tts-engine
    user: "1000:1000"
    expose:
      - "8000"
    volumes:
      - ./data/models:/models
      - ./data/voices:/voice
    environment:
      - TTS_MODEL=Qwen/Qwen3-TTS-12Hz-0.6B-Base
      - REF_AUDIO=/voice/referencia.mp3
      - REF_TEXT=Prólogo. Mar de Noruega. Año aproximado, 1200 después de Cristo. El barco de pesca había salido de su ruta habitual. Eric y su hijo Hans habían salido a faenar al norte de su poblado natal, Blake. Esos días había habido mucha corriente y poco viento, lo que los alejó bastante de la zona de pesca del bacalao.
      - HF_HOME=/models
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4g

  postgres:
    image: postgres:16-alpine
    container_name: audiobook-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=audiobooks
      - POSTGRES_USER=audio_user
      - POSTGRES_PASSWORD=audio_pass
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U audio_user -d audiobooks" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: audiobook-backend
    user: "1000:1000"
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - ./data:/data
    environment:
      - DATABASE_URL=postgresql+asyncpg://audio_user:audio_pass@postgres/audiobooks
      - TTS_ENGINE_URL=http://tts-engine:8000
      - CLOUD_TTS_URL=https://marti-vich--voxlibrix-tts-tts-tts.modal.run
      - DATA_DIR=/data
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
      tts-engine:
        condition: service_started
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload

  frontend:
    build: ./frontend
    container_name: audiobook-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    restart: unless-stopped
